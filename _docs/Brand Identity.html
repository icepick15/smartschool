<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartS — Brand Identity System</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background: #0A0A0F; color: #F0F0FF; font-family: 'DM Sans', sans-serif; overflow-x: hidden; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #0D0D14; }
    ::-webkit-scrollbar-thumb { background: #252535; border-radius: 3px; }
    input, select, textarea { outline: none; }
    button { cursor: pointer; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel">

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#7C3AED",
  "accentLight": "#A78BFA",
  "accentSecondary": "#6366F1",
  "logoStroke": 5
}/*EDITMODE-END*/;

const { useState, useEffect } = React;

/* ─── LOGO ─────────────────────────────────────────────────────────── */
function SmartSMark({ size = 40, c1 = "#7C3AED", c2 = "#6366F1" }) {
  const uid = "g" + size + c1.replace("#","");
  return (
    <svg width={size} height={size} viewBox="0 0 40 44" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id={uid} x1="30" y1="7" x2="10" y2="38" gradientUnits="userSpaceOnUse">
          <stop stopColor={c1}/>
          <stop offset="1" stopColor={c2}/>
        </linearGradient>
      </defs>
      <path
        d="M 31 8 C 20 7 8 10 8 17 C 8 24 33 21 33 30 C 33 38 20 39 9 38"
        stroke={"url(#" + uid + ")"} strokeWidth="5.5" strokeLinecap="round" fill="none"/>
    </svg>
  );
}

function SmartSWordmark({ size = 20, color = "#F0F0FF", accent = "#7C3AED", accent2 = "#6366F1" }) {
  return (
    <div style={{ display: "flex", alignItems: "center", gap: size * 0.28 }}>
      <SmartSMark size={size * 1.1} c1={accent} c2={accent2}/>
      <span style={{ fontFamily: "Syne", fontWeight: 800, fontSize: size, color, letterSpacing: "-0.04em", lineHeight: 1 }}>SmartS</span>
    </div>
  );
}

/* ─── NAV ───────────────────────────────────────────────────────────── */
const SECTIONS = [
  { id: "strategy",   label: "Brand Strategy"  },
  { id: "logo",       label: "Logo System"      },
  { id: "colors",     label: "Color Palette"    },
  { id: "typography", label: "Typography"       },
  { id: "components", label: "UI Components"    },
  { id: "dashboard",  label: "Dashboard UI"     },
  { id: "mobile",     label: "Mobile App"       },
  { id: "marketing",  label: "Marketing Kit"    },
  { id: "voice",      label: "Brand Voice"      },
];

function SideNav({ active, onNav, accent }) {
  return (
    <nav style={{
      position: "fixed", left: 0, top: 0, bottom: 0, width: 216,
      background: "#0D0D14", borderRight: "1px solid #1A1A28",
      display: "flex", flexDirection: "column", zIndex: 100,
    }}>
      <div style={{ padding: "22px 22px 24px", borderBottom: "1px solid #1A1A28" }}>
        <SmartSWordmark size={16} accent={accent}/>
        <div style={{ fontFamily: "DM Mono", fontSize: 9, color: "#4A4A6A", marginTop: 6, letterSpacing: "0.08em", textTransform: "uppercase" }}>Brand Identity v1.0</div>
      </div>
      <div style={{ flex: 1, overflowY: "auto", padding: "12px 0" }}>
        {SECTIONS.map((s, i) => {
          const isActive = active === s.id;
          return (
            <button key={s.id} onClick={() => onNav(s.id)} style={{
              display: "block", width: "100%", textAlign: "left",
              padding: "8px 22px", background: isActive ? accent + "14" : "none",
              border: "none", borderLeft: isActive ? "2px solid " + accent : "2px solid transparent",
              fontFamily: "DM Sans", fontSize: 13, fontWeight: isActive ? 600 : 400,
              color: isActive ? "#C4B5FD" : "#5A5A7A", transition: "all 0.12s",
            }}>
              <span style={{ color: "#4A4A6A", fontFamily: "DM Mono", fontSize: 10, marginRight: 8 }}>
                {String(i + 1).padStart(2, "0")}
              </span>
              {s.label}
            </button>
          );
        })}
      </div>
      <div style={{ padding: "14px 22px", borderTop: "1px solid #1A1A28" }}>
        <div style={{ fontFamily: "DM Mono", fontSize: 9, color: "#3A3A55", lineHeight: 1.6 }}>
          Ice Resources Operating<br/>© 2026 · Confidential
        </div>
      </div>
    </nav>
  );
}

/* ─── HELPERS ───────────────────────────────────────────────────────── */
function SectionHead({ num, title, subtitle }) {
  return (
    <div style={{ marginBottom: 40 }}>
      <div style={{ display: "flex", alignItems: "baseline", gap: 12, marginBottom: 8 }}>
        <span style={{ fontFamily: "DM Mono", fontSize: 11, color: "#4A4A6A" }}>{num}</span>
        <h2 style={{ fontFamily: "Syne", fontWeight: 800, fontSize: 26, color: "#F0F0FF", letterSpacing: "-0.03em" }}>{title}</h2>
      </div>
      {subtitle && <p style={{ fontFamily: "DM Sans", fontSize: 14, color: "#5A5A7A", maxWidth: 520, lineHeight: 1.65, paddingLeft: 32 }}>{subtitle}</p>}
    </div>
  );
}

function Card({ children, style = {} }) {
  return (
    <div style={{ background: "#111118", border: "1px solid #1E1E2E", borderRadius: 12, ...style }}>
      {children}
    </div>
  );
}

function Label({ children }) {
  return (
    <div style={{ fontFamily: "DM Mono", fontSize: 9, color: "#4A4A6A", textTransform: "uppercase", letterSpacing: "0.12em", marginBottom: 14 }}>
      {children}
    </div>
  );
}

function Badge({ children, color = "#7C3AED" }) {
  return (
    <span style={{
      display: "inline-block", padding: "2px 10px", borderRadius: 100,
      background: color + "22", color, fontSize: 11, fontWeight: 600,
      fontFamily: "DM Sans", letterSpacing: "0.01em",
    }}>{children}</span>
  );
}

function Swatch({ hex, name, role }) {
  const [copied, setCopied] = useState(false);
  return (
    <div onClick={() => { navigator.clipboard?.writeText(hex); setCopied(true); setTimeout(() => setCopied(false), 1400); }}
      style={{ background: "#111118", border: "1px solid #1E1E2E", borderRadius: 10, overflow: "hidden", cursor: "pointer" }}>
      <div style={{ height: 68, background: hex }}/>
      <div style={{ padding: "10px 12px" }}>
        <div style={{ fontFamily: "DM Mono", fontSize: 11, color: "#F0F0FF", marginBottom: 2 }}>{copied ? "Copied!" : hex}</div>
        <div style={{ fontSize: 12, fontWeight: 600, color: "#8B8BA7" }}>{name}</div>
        <div style={{ fontSize: 10, color: "#4A4A6A", marginTop: 2 }}>{role}</div>
      </div>
    </div>
  );
}

function Btn({ children, variant = "primary", sm, accent = "#7C3AED", onClick }) {
  const [hov, setHov] = useState(false);
  const base = {
    display: "inline-flex", alignItems: "center", gap: 6,
    padding: sm ? "5px 12px" : "9px 18px",
    borderRadius: 7, fontFamily: "DM Sans", fontWeight: 500,
    fontSize: sm ? 12 : 13, transition: "all 0.13s", border: "none",
  };
  const v = {
    primary: { background: hov ? "#6D28D9" : accent, color: "#fff" },
    secondary: { background: hov ? "#1E1E2E" : "#16161F", color: "#A78BFA", border: "1px solid #252535" },
    ghost: { background: "none", color: hov ? "#A78BFA" : "#6B6B8A" },
    danger: { background: hov ? "#450A0A" : "#1F1010", color: "#FCA5A5", border: "1px solid #3B0000" },
  };
  return <button style={{ ...base, ...v[variant] }} onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)} onClick={onClick}>{children}</button>;
}

/* ─── DASHBOARD ─────────────────────────────────────────────────────── */

    <div style={{ background: "#0D0D14", border: "1px solid #1E1E2E", borderRadius: 14, overflow: "hidden", fontFamily: "DM Sans" }}>

        <span style={{ fontFamily: "Syne", fontWeight: 700, fontSize: 14, color: "#F0F0FF" }}>SmartS</span>
        <span style={{ background: accent + "22", color: accent, fontSize: 9, fontWeight: 700, padding: "2px 7px", borderRadius: 4, letterSpacing: "0.06em" }}>SCHOOL</span>
        <div style={{ flex: 1 }}/>
        <div style={{ width: 6, height: 6, borderRadius: "50%", background: "#10B981" }}/>
        <span style={{ fontSize: 11, color: "#5A5A7A" }}>Greenfield Academy</span>

      </div>
      <div style={{ display: "flex", height: 400 }}>
        {/* sidebar */}

              <div style={{ height: "100%", width: "60%", background: accent, borderRadius: 2 }}/>
            </div>

        </div>
        {/* main */}
        <div style={{ flex: 1, padding: "18px 20px", overflowY: "auto" }}>

            </div>
            <div style={{ display: "flex", gap: 8 }}>
              <Btn sm variant="secondary" accent={accent}>↗ Export</Btn>

                  <div style={{ flex: 1 }}>

                <div key={a.label} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 10px", marginBottom: 6, borderRadius: 7, background: "#16161F", cursor: "pointer", transition: "background 0.1s" }}>

            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ─── MOBILE SCREENS ────────────────────────────────────────────────── */
function MobileScreen({ children, label, accent, active, onClick }) {
  return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 10 }}>
      <div onClick={onClick} style={{
        width: 190, height: 370, background: "#0A0A0F",
        border: "1.5px solid " + (active ? accent : "#1E1E2E"),
        borderRadius: 24, overflow: "hidden", cursor: "pointer",
        boxShadow: active ? "0 0 24px " + accent + "40" : "none",
        transition: "all 0.2s",
      }}>
        {children}
      </div>
      <div style={{ fontFamily: "DM Mono", fontSize: 10, color: active ? accent : "#4A4A6A" }}>{label}</div>
    </div>
  );
}

            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <SmartSMark size={18} c1={accent}/>

              ))}
            </div>
          </div>
          {/* tab bar */}
          <div style={{ display: "flex", borderTop: "1px solid #1A1A28", padding: "8px 0" }}>
            {["🏠","👥","📅","💳","⚙️"].map((icon, i) => (
              <div key={i} style={{ flex: 1, textAlign: "center", fontSize: 16, opacity: i===0?1:0.4 }}>{icon}</div>

/* ─── MAIN APP ──────────────────────────────────────────────────────── */
function App() {
  const [tweaks, setTweak] = window.useTweaks(TWEAK_DEFAULTS);
  const [active, setActive] = useState("strategy");
  const accent = tweaks.accentColor;
  const accentL = tweaks.accentLight;
  const accent2 = tweaks.accentSecondary;

  useEffect(() => {
    const el = document.getElementById("scroll-area");
    if (!el) return;
    function onScroll() {
      for (const s of [...SECTIONS].reverse()) {
        const sec = document.getElementById(s.id);
        if (sec && sec.offsetTop - el.scrollTop < 140) { setActive(s.id); break; }
      }
    }
    el.addEventListener("scroll", onScroll);
    return () => el.removeEventListener("scroll", onScroll);
  }, []);

                    <div style={{ fontFamily: "DM Sans", fontSize: 11, color: "#5A5A7A", marginBottom: 8 }}>Head of Enterprise · SmartS School</div>
                    <div style={{ fontFamily: "DM Mono", fontSize: 9, color: "#4A4A6A" }}>amara@smarts.io · +234 800 000 0000</div>
                    <div style={{ fontFamily: "DM Mono", fontSize: 9, color: "#4A4A6A", marginTop: 2 }}>smarts.io · Lagos, Nigeria</div>
                  </div>
                </div>
              </Card>
            </div>
          </div>
          {/* Email */}
          <div style={{ marginBottom: 20 }}>
            <Label>Email Template</Label>
            <Card style={{ overflow: "hidden", maxWidth: 560 }}>
              <div style={{ background: "#0A0A0F", borderBottom: "3px solid " + accent, padding: "16px 24px", display: "flex", alignItems: "center", gap: 10 }}>
                <SmartSWordmark size={16} accent={accent} accent2={accent2}/>
              </div>
              <div style={{ padding: "28px 24px" }}>
                <div style={{ fontFamily: "Syne", fontWeight: 700, fontSize: 20, color: "#F0F0FF", marginBottom: 10 }}>Welcome to SmartS School 👋</div>
                <div style={{ fontFamily: "DM Sans", fontSize: 14, color: "#5A5A7A", lineHeight: 1.75, marginBottom: 22 }}>Your institution is now set up. Start by adding your staff, importing student data, or exploring the timetable builder. We are here if you need help.</div>
                <Btn accent={accent}>Open Dashboard →</Btn>
                <div style={{ marginTop: 24, paddingTop: 18, borderTop: "1px solid #1A1A28", fontFamily: "DM Mono", fontSize: 9, color: "#3A3A55" }}>SmartS School · Ice Resources Operating · smarts.io · Unsubscribe</div>
              </div>
            </Card>
          </div>
          {/* Pitch Deck Style */}
          <div>
            <Label>Pitch Deck Slide Style</Label>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
              <Card style={{ padding: "32px 28px", position: "relative", overflow: "hidden" }}>
                <div style={{ position: "absolute", top: -40, right: -40, width: 200, height: 200, background: accent, borderRadius: "50%", opacity: 0.12, filter: "blur(60px)" }}/>
                <Badge color={accent}>Title Slide</Badge>
                <div style={{ fontFamily: "Syne", fontWeight: 800, fontSize: 28, color: "#F0F0FF", letterSpacing: "-0.04em", marginTop: 16, marginBottom: 8 }}>Transforming how<br/>schools operate.</div>
                <div style={{ fontFamily: "DM Sans", fontSize: 13, color: "#5A5A7A" }}>SmartS School · Investor Deck · 2026</div>
              </Card>
              <Card style={{ padding: "28px" }}>
                <Badge color="#5A5A7A">Content Slide</Badge>
                <div style={{ fontFamily: "Syne", fontWeight: 700, fontSize: 18, color: "#F0F0FF", marginTop: 12, marginBottom: 14 }}>The Problem</div>
                {["School administrators juggle 6+ disconnected tools daily.", "No single source of truth for staff, students, or finances.", "Manual processes create costly errors at scale."].map(p => (
                  <div key={p} style={{ display: "flex", gap: 10, marginBottom: 8 }}>
                    <div style={{ width: 5, height: 5, borderRadius: "50%", background: accent, marginTop: 6, flexShrink: 0 }}/>
                    <div style={{ fontSize: 13, color: "#9090B0", lineHeight: 1.5 }}>{p}</div>
                  </div>
                ))}
              </Card>
            </div>
          </div>
        </div>

        {/* ── 09 BRAND VOICE ── */}
        <div id="voice" style={{ padding: pad, borderBottom: "1px solid #1A1A28" }}>
          <SectionHead num="09" title="Brand Voice" subtitle="How SmartS speaks — confident, precise, and always in service of the reader. Never loud. Never vague."/>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, marginBottom: 28 }}>
            {[
              { tone: "Confident", not: "Arrogant", eg: "SmartS handles the complexity, so your team can focus on what matters most." },
              { tone: "Precise", not: "Technical", eg: "Every approval, every record — tracked, traceable, and always accessible." },
              { tone: "Warm", not: "Casual", eg: "Your school runs better when everyone has the right tools in hand." },
              { tone: "Future-oriented", not: "Vague", eg: "Built to scale with your institution, from one campus to a thousand." },
            ].map(t => (
              <Card key={t.tone} style={{ padding: 20 }}>
                <div style={{ display: "flex", gap: 10, marginBottom: 10, alignItems: "baseline" }}>
                  <span style={{ fontFamily: "Syne", fontWeight: 700, fontSize: 15, color: accentL }}>{t.tone}</span>
                  <span style={{ fontFamily: "DM Sans", fontSize: 11, color: "#4A4A6A" }}>— not {t.not}</span>
                </div>
                <p style={{ fontFamily: "DM Sans", fontSize: 14, color: "#8080A0", lineHeight: 1.7, fontStyle: "italic" }}>"{t.eg}"</p>
              </Card>
            ))}
          </div>
          <div style={{ marginBottom: 28 }}>
            <Label>Tagline Options</Label>
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {[
                { line: "Run the school. Not the spreadsheet.", note: "Direct · problem-aware" },
                { line: "Where operations meet intelligence.", note: "Premium · aspirational" },
                { line: "Every school. One platform.",          note: "Scale-focused" },
                { line: "Built for institutions that move fast.", note: "Enterprise-forward" },
                { line: "Smart operations. Smarter schools.",   note: "Name wordplay" },
              ].map((t, i) => (
                <div key={i} style={{ display: "flex", alignItems: "center", gap: 16, padding: "13px 20px", background: "#111118", border: "1px solid #1E1E2E", borderRadius: 9 }}>
                  <span style={{ fontFamily: "DM Mono", fontSize: 10, color: "#4A4A6A", width: 22, flexShrink: 0 }}>0{i+1}</span>
                  <span style={{ fontFamily: "Syne", fontWeight: 600, fontSize: 16, color: "#F0F0FF", flex: 1 }}>{t.line}</span>
                  <Badge color="#5A5A7A">{t.note}</Badge>
                </div>
              ))}
            </div>
          </div>
          <Card style={{ padding: 24 }}>
            <Label>Sample Website Copy</Label>
            <div style={{ fontFamily: "Syne", fontWeight: 800, fontSize: 38, color: "#F0F0FF", letterSpacing: "-0.04em", lineHeight: 1.05, marginBottom: 14 }}>
              The operating system<br/>for modern schools.
            </div>
            <div style={{ fontFamily: "DM Sans", fontSize: 16, color: "#5A5A7A", lineHeight: 1.75, marginBottom: 20, maxWidth: 520 }}>
              SmartS School is an all-in-one platform that automates the workflows your school already runs — from HR and timetabling to fees and reporting. Less admin. More education.
            </div>
            <div style={{ display: "flex", gap: 10 }}>
              <Btn accent={accent}>Start free trial →</Btn>
              <Btn variant="secondary" accent={accent}>Book a demo</Btn>
            </div>
          </Card>
        </div>

        {/* FOOTER */}
        <div style={{ padding: "36px 64px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <SmartSWordmark size={16} accent={accent} accent2={accent2}/>
          <span style={{ fontFamily: "DM Mono", fontSize: 10, color: "#3A3A55" }}>Ice Resources Operating · SmartS v1.0 · April 2026 · Confidential</span>
        </div>

      </div>

      {/* TWEAKS */}
      <window.TweaksPanel>
        <window.TweakSection label="Brand Colors"/>
        <window.TweakColor label="Primary Accent" value={tweaks.accentColor} onChange={v => setTweak("accentColor", v)}/>
        <window.TweakColor label="Light Accent" value={tweaks.accentLight} onChange={v => setTweak("accentLight", v)}/>
        <window.TweakColor label="Secondary Accent" value={tweaks.accentSecondary} onChange={v => setTweak("accentSecondary", v)}/>
      </window.TweaksPanel>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
